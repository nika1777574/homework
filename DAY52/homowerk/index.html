<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- TOP -->
  <div class="top">
    <div class="big">1</div>

    <div class="right">
      <div class="row">
        <div>2</div>
        <div>3</div>
      </div>
      <div class="row">
        <div>4</div>
        <div>5</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <div class="left">
      <div class="row">
        <div>2</div>
        <div>3</div>
      </div>
      <div class="row">
        <div>4</div>
        <div>5</div>
      </div>
    </div>

    <div class="big">1</div>
  </div>

</div>

</body>
</html>
