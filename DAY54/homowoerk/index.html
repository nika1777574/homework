<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>City Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="card korea">
    <div class="overlay"></div>
    <div class="text">
      <h1>South Korea</h1>
      <p>Seoul is very beautiful place</p>
    </div>
  </div>

  <div class="card tbilisi">
    <div class="overlay"></div>
    <div class="text">
      <h1>Tbilisi</h1>
      <p>Tbilisi is very beautiful place</p>
    </div>
  </div>

  <div class="card newyork">
    <div class="overlay"></div>
    <div class="text">
      <h1>New York</h1>
      <p>New York is very beautiful place</p>
    </div>
  </div>

  <div class="card paris">
    <div class="overlay"></div>
    <div class="text">
      <h1>Paris</h1>
      <p>Paris is very beautiful place</p>
    </div>
  </div>

  <div class="card tokyo">
    <div class="overlay"></div>
    <div class="text">
      <h1>Tokyo</h1>
      <p>Tokyo is very beautiful place</p>
    </div>
  </div>

  <div class="card dubai">
    <div class="overlay"></div>
    <div class="text">
      <h1>Dubai</h1>
      <p>Dubai is very beautiful place</p>
    </div>
  </div>

</div>

</body>
</html>
