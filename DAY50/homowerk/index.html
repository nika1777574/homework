<!--Flexbox  არის CSS-ის მოდელი,
რომელიც გამოიყენება ელემენტების მოქნილად დასალაგებლად  

 flex-direction განსაზღვრავს ელემენტების მიმართულებას

flex-direction: row;
ელემენტები განლაგდება ჰორიზონტალურად (მარცხნიდან მარჯვნივ) 

flex-direction: row-reverse;
ჰორიზონტალურად, მაგრამ პირიქით (მარჯვნიდან მარცხნივ) 

flex-direction: column;
ელემენტები განლაგდება ვერტიკალურად (ზემოდან ქვემოთ)

flex-direction: column-reverse;
 ვერტიკალურად, მაგრამ პირიქით (ქვემოდან ზემოთ)
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="parent">
    <div class="child"></div>
    <div class="child"></div>
    <div class="child"></div>
</div>

</body>
</html>
