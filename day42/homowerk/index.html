<!--
Class selector გამოიყენება მაშინ როცა ერთნაირი სტილი 
უნდა მივცეთ ბევრ ელემენტს.

ID selector გამოიყენება მხოლოდ ერთი კონკრეტული ელემენტისთვის.

1  ID selector (#) – ყველაზე მაღალი პრიორიტეტი  
2️  Class selector (.) – საშუალო პრიორიტეტი  
3️  Tag selector (p, h1, div) – ყველაზე დაბალი პრიორიტეტი
-->
